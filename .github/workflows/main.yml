name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          echo "Verificando existencia de archivos requeridos..."
          if [ -f "home.html" ]; then
            echo "✓ home.html encontrado"
          else
            echo "✗ ERROR: home.html no encontrado"
            exit 1
          fi
          if [ -f "styles.css" ]; then
            echo "✓ styles.css encontrado"
          else
            echo "✗ ERROR: styles.css no encontrado"
            exit 1
          fi
          echo "Todos los archivos requeridos existen."

  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Prepare Artifacts
        run: |
          echo "=============================================="
          echo "Preparando artefactos para despliegue..."
          echo "=============================================="
          echo "Artefactos listos para el despliegue en el entorno de Staging"
          echo "Compilando activos..."
          echo "- HTML: home.html"
          echo "- CSS: styles.css"
          echo "=============================================="
          echo "Despliegue preparado exitosamente."
          echo "=============================================="