name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          echo "Verificando existencia de archivos requeridos..."
          if [ -f "home.html" ]; then
            echo "✓ home.html encontrado"
          else
            echo "✗ ERROR: home.html no encontrado"
            exit 1
          fi
          if [ -f "styles.css" ]; then
            echo "✓ styles.css encontrado"
          else
            echo "✗ ERROR: styles.css no encontrado"
            exit 1
          fi
          echo "Todos los archivos requeridos existen."

  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4